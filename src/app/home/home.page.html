<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Home Page
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Home</ion-title>
    </ion-toolbar>
  </ion-header>
  <br>
  <p *ngIf="tasks.length === 0">List is empty</p>
  <ion-item *ngIf="tasks.length > 0">
    <ion-checkbox></ion-checkbox>
  </ion-item>
  <ion-button [routerLink] = "['/add-task']">+ add new task</ion-button>

</ion-content>
